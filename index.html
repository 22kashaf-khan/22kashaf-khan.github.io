<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kashaf AI Twin</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0d1117, #111827);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .chat-container {
      width: 100%;
      max-width: 760px;
      background: rgba(22, 27, 34, 0.95);
      border: 1px solid #30363d;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      color: #58a6ff;
    }

    .hero p {
      margin: 8px 0 0;
      color: #c9d1d9;
      font-size: 15px;
      line-height: 1.5;
    }

    .quick-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0 18px;
      justify-content: center;
    }

    .quick-questions button {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .quick-questions button:hover {
      background: #30363d;
      transform: translateY(-1px);
    }

    #messages {
      height: 420px;
      overflow-y: auto;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
      background: #0d1117;
      scroll-behavior: smooth;
    }

    .message {
      margin: 12px 0;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.55;
      max-width: 85%;
      white-space: pre-wrap;
    }

    .user {
      background: #238636;
      margin-left: auto;
      text-align: left;
    }

    .bot {
      background: #21262d;
      margin-right: auto;
      text-align: left;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #30363d;
      outline: none;
      font-size: 15px;
      background: #0d1117;
      color: white;
    }

    input::placeholder {
      color: #8b949e;
    }

    button.send-btn {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #58a6ff;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    button.send-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .footer-note {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      color: #8b949e;
    }

    @media (max-width: 640px) {
      .chat-container {
        padding: 18px;
      }

      .hero h1 {
        font-size: 26px;
      }

      .message {
        max-width: 92%;
      }

      .input-row {
        flex-direction: column;
      }

      button.send-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="hero">
      <h1>🤖 Kashaf AI Twin</h1>
      <p>
        Ask about my projects, experience, skills, personality, or what I think about AI hype.
      </p>
    </div>

    <div class="quick-questions">
      <button onclick="askQuickQuestion('What has Kashaf built?')">What has Kashaf built?</button>
      <button onclick="askQuickQuestion('What is Kashaf working on right now?')">What is he working on?</button>
      <button onclick="askQuickQuestion('Why should someone hire Kashaf?')">Why hire Kashaf?</button>
      <button onclick="askQuickQuestion('Is Kashaf open to work or collaborations?')">Open to work?</button>
      <button onclick="askQuickQuestion('What does Kashaf think about AI hype?')">AI hype?</button>
      <button onclick="askQuickQuestion('What kind of person is Kashaf?')">What is he like?</button>
    </div>

    <div id="messages">
      <div class="message bot">
        Hey — I’m Kashaf’s AI twin. Ask me anything about his work, projects, experience, or personality.
      </div>
    </div>

    <div class="input-row">
      <input
        id="input"
        type="text"
        placeholder="Ask something like: What makes Kashaf different?"
        onkeydown="if(event.key==='Enter') sendMessage()"
      />
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <div class="footer-note">
      Built with Gemini + Vercel + GitHub Pages
    </div>
  </div>

  <script>
    const API_URL = "https://ai-twin-backend-omega.vercel.app/api/chat";

    function askQuickQuestion(question) {
      document.getElementById("input").value = question;
      sendMessage();
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const userText = input.value.trim();

      if (!userText) return;

      messages.innerHTML += `<div class="message user">${escapeHtml(userText)}</div>`;
      input.value = "";
      messages.innerHTML += `<div class="message bot" id="typing">Thinking...</div>`;
      messages.scrollTop = messages.scrollHeight;

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: userText })
        });

        const data = await response.json();

        const typing = document.getElementById("typing");
        if (typing) typing.remove();

        if (!response.ok) {
          messages.innerHTML += `<div class="message bot">Backend error: ${escapeHtml(data.error || "Unknown error")}</div>`;
          messages.scrollTop = messages.scrollHeight;
          return;
        }

        messages.innerHTML += `<div class="message bot">${escapeHtml(data.reply)}</div>`;
        messages.scrollTop = messages.scrollHeight;
      } catch (error) {
        const typing = document.getElementById("typing");
        if (typing) typing.remove();

        messages.innerHTML += `<div class="message bot">Connection failed: ${escapeHtml(error.message)}</div>`;
        messages.scrollTop = messages.scrollHeight;
      }
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
