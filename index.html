<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kashaf AI Twin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .chat-container {
      width: 90%;
      max-width: 600px;
      background: #161b22;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .messages {
      height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    .message {
      margin: 10px 0;
    }
    .user { color: #58a6ff; }
    .bot { color: #3fb950; }
    input {
      width: 80%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }
    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #238636;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🤖 Chat with Kashaf's AI Twin</h1>

<div class="chat-container">
  <div class="messages" id="messages"></div>
  <input id="input" placeholder="Ask about Kashaf..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_KEY = "YOUR_ANTHROPIC_API_KEY";

const systemPrompt = `You are an AI assistant representing Kashaf Khan, an AI Engineer.

About Kashaf:
- AI Consultant at Siemens Mobility in Berlin
- M.Sc. AI student at BTU Cottbus
- 3+ years experience in ML, NLP, CV, and MLOps
- Expert in LLMs, RAG pipelines, FastAPI, Docker
- Built enterprise AI systems and chatbots
- Winner of NIB 2022 startup competition

Be professional, concise, and helpful. Answer as Kashaf would.`;

async function sendMessage() {
  const input = document.getElementById("input");
  const messagesDiv = document.getElementById("messages");

  const userText = input.value;
  if (!userText) return;

  messagesDiv.innerHTML += `<div class='message user'><b>You:</b> ${userText}</div>`;
  input.value = "";

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: "claude-3-haiku-20240307",
      max_tokens: 300,
      messages: [
        { role: "user", content: systemPrompt + "\n\nUser: " + userText }
      ]
    })
  });

  const data = await response.json();
  const botText = data.content?.[0]?.text || "Error";

  messagesDiv.innerHTML += `<div class='message bot'><b>Kashaf:</b> ${botText}</div>`;
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
</script>

</body>
</html>
