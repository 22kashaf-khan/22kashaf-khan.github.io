<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kashaf AI Twin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 90%;
      max-width: 700px;
      background: #161b22;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    h1 {
      text-align: center;
      color: #58a6ff;
    }
    #messages {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 15px;
      background: #0d1117;
    }
    .message {
      margin: 10px 0;
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.5;
    }
    .user {
      background: #238636;
      text-align: right;
    }
    .bot {
      background: #21262d;
      text-align: left;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #58a6ff;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <h1>🤖 Chat with Kashaf's AI Twin</h1>
    <div id="messages"></div>
    <div class="input-row">
      <input id="input" type="text" placeholder="Ask about Kashaf's projects, skills, or experience..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const userText = input.value.trim();

      if (!userText) return;

      messages.innerHTML += `<div class="message user">${userText}</div>`;
      input.value = "";
      messages.innerHTML += `<div class="message bot" id="typing">Thinking...</div>`;
      messages.scrollTop = messages.scrollHeight;

      try {
        const response = await fetch("https://ai-twin-backend-omega.vercel.app/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: userText })
        });

        const data = await response.json();
        document.getElementById("typing").remove();
        messages.innerHTML += `<div class="message bot">${data.reply}</div>`;
        messages.scrollTop = messages.scrollHeight;
      } catch (error) {
        document.getElementById("typing").remove();
        messages.innerHTML += `<div class="message bot">Error connecting to AI backend.</div>`;
      }
    }
  </script>
</body>
</html>
